# Codex project configuration for Recursive/Nightshift
# See: https://developers.openai.com/codex/config-reference

model = "gpt-5.4"
model_reasoning_effort = "xhigh"
sandbox_mode = "workspace-write"
# Brain instructions are prepended to the prompt by daemon.sh, not loaded here.
# Using developer_instructions (additive) not model_instructions_file (replaces
# built-in instructions including spawn_agent tool knowledge).

[agents]
max_threads = 6
max_depth = 1

[features]
multi_agent = true
