name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel in-progress runs for the same branch/PR — no point finishing
# a stale run when a newer commit has already been pushed.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

env:
  # Force unbuffered output so logs stream in real time.
  PYTHONUNBUFFERED: "1"

jobs:
  # ──────────────────────────────────────────────────────────────────
  # Stage 1: Lint (fast gate)
  # Catches formatting drift and import issues before slower jobs run.
  # ──────────────────────────────────────────────────────────────────
  lint:
    name: Lint
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5.6.0
        with:
          python-version: "3.12"

      - name: Cache pip
        uses: actions/cache@5a3ec84eff668545956fd18022155c47e93e2684  # v4.2.3
        with:
          path: ~/.cache/pip
          key: lint-pip-${{ hashFiles('requirements-dev.txt') }}
          restore-keys: lint-pip-

      - name: Install dev dependencies
        run: pip install -r requirements-dev.txt

      - name: Ruff check (lint rules)
        run: ruff check nightshift/ tests/

      - name: Ruff format (formatting)
        run: ruff format --check nightshift/ tests/

  # ──────────────────────────────────────────────────────────────────
  # Stage 2a: Type check
  # mypy strict — no untyped defs, no Any leakage, no unreachable code.
  # ──────────────────────────────────────────────────────────────────
  typecheck:
    name: Type check
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: lint
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5.6.0
        with:
          python-version: "3.12"

      - name: Cache pip
        uses: actions/cache@5a3ec84eff668545956fd18022155c47e93e2684  # v4.2.3
        with:
          path: ~/.cache/pip
          key: typecheck-pip-${{ hashFiles('requirements-dev.txt') }}
          restore-keys: typecheck-pip-

      - name: Install dev dependencies
        run: pip install -r requirements-dev.txt

      - name: Mypy strict
        run: mypy nightshift/

  # ──────────────────────────────────────────────────────────────────
  # Stage 2b: Tests
  # Runs pytest across the supported Python version range.
  # 3.9 = minimum supported, 3.12 = latest stable.
  # ──────────────────────────────────────────────────────────────────
  test:
    name: Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: lint
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.9", "3.12"]
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5.6.0
        with:
          python-version: ${{ matrix.python-version }}

      - name: Cache pip
        uses: actions/cache@5a3ec84eff668545956fd18022155c47e93e2684  # v4.2.3
        with:
          path: ~/.cache/pip
          key: test-pip-${{ matrix.python-version }}-${{ hashFiles('requirements-dev.txt') }}
          restore-keys: test-pip-${{ matrix.python-version }}-

      - name: Install dev dependencies
        run: pip install -r requirements-dev.txt

      - name: Run tests
        run: pytest tests/ -v --tb=short

  # ──────────────────────────────────────────────────────────────────
  # Stage 3: Integration
  # Verifies the CLI entry points actually work — dry-run both agents,
  # confirm the prompt is generated and the schema is loaded.
  # ──────────────────────────────────────────────────────────────────
  integration:
    name: Integration
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: [typecheck, test]
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5.6.0
        with:
          python-version: "3.12"

      - name: Dry-run (codex agent)
        run: python -m nightshift run --dry-run --agent codex

      - name: Dry-run (claude agent)
        run: python -m nightshift run --dry-run --agent claude

      - name: Test subcommand (dry-run)
        run: python -m nightshift test --dry-run --agent codex

      - name: Summarize rejects missing state
        run: |
          # summarize with no state file should exit non-zero
          if python -m nightshift summarize 2>/dev/null; then
            echo "ERROR: summarize should have failed with no state file"
            exit 1
          fi

  # ──────────────────────────────────────────────────────────────────
  # Stage 2c: Validate artifacts
  # Checks that non-code files are correct — the JSON schema parses,
  # the example config parses, and install.sh references only files
  # that actually exist in the repo.
  # ──────────────────────────────────────────────────────────────────
  validate-artifacts:
    name: Validate artifacts
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5.6.0
        with:
          python-version: "3.12"

      - name: Schema is valid JSON
        run: python -c "import json, pathlib; json.loads(pathlib.Path('nightshift.schema.json').read_text())"

      - name: Example config is valid JSON
        run: python -c "import json, pathlib; json.loads(pathlib.Path('.nightshift.json.example').read_text())"

      - name: scripts/install.sh references only files that exist
        run: |
          python -c "
          import re, sys
          from pathlib import Path
          content = Path('scripts/install.sh').read_text()
          files = re.findall(r'^  \"((?:nightshift/|scripts/)?[A-Za-z_.][^\"]*\.(?:py|sh|md|json|example))\"', content, re.MULTILINE)
          missing = [f for f in files if not Path(f).exists()]
          if missing:
              print('Missing files referenced in scripts/install.sh:', missing)
              sys.exit(1)
          print(f'All {len(files)} file references in scripts/install.sh verified.')
          "

      - name: No non-ASCII in source
        run: |
          python -c "
          import re, sys
          from pathlib import Path
          non_ascii = re.compile(r'[^\x00-\x7E]')
          files = list(Path('nightshift').rglob('*.py')) + list(Path('tests').rglob('*.py'))
          files += [Path(f) for f in ['scripts/check.sh', 'scripts/install.sh', 'scripts/run.sh', 'scripts/test.sh', 'pyproject.toml']]
          found = []
          for f in sorted(files):
              for i, line in enumerate(f.read_text().splitlines(), 1):
                  for m in non_ascii.finditer(line):
                      found.append(f'{f}:{i}: U+{ord(m.group()):04X} {repr(m.group())}')
          if found:
              print('Non-ASCII characters found:')
              for line in found:
                  print(f'  {line}')
              sys.exit(1)
          print(f'All {len(files)} source files are ASCII-clean.')
          "

      - name: Shell scripts pass syntax check
        run: |
          bash -n scripts/run.sh
          bash -n scripts/test.sh
          bash -n scripts/install.sh
          bash -n scripts/check.sh
